<!DOCTYPE html>
<html>
<head>
    <title>Add New Course</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Home</a>
            <a href="my-courses.html">My Courses</a>
            <a href="add-course.html">Add Course</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h2>Add a New Course</h2>
        <form>
            <label>Course Name:</label>
            <input type="text" name="c_name">
            
            <label>Instructor:</label>
            <input type="text" name="c_inst">
            
            <label>Credit Hours:</label>
            <input type="number" name="c_hours">
            
            <label>Notes:</label>
            <textarea name="c_notes" rows="5"></textarea>
            
            <button type="button">Add Course</button>
        </form>
    </main>

    <footer>
        <p>Copyright 2026 - Done by Rodina</p>
    </footer>
</body>
</html>
